# AC-DL joint gate (AC-DL-1 §7 + AC-DL-2 criterion 7).
# The only denylist-compliant state: all criteria applicable in-phase green
# in the same CI run. Guard tests run hermetically (loopback only) in
# release mode. No third-party actions are used anywhere in this workflow,
# so the SHA-pinning rule (constitution #7) is satisfied by construction.
name: acdl-gate

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acdl-joint-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (action-free)
        run: |
          git init .
          git fetch --depth 1 https://x-access-token:${{ github.token }}@github.com/${{ github.repository }} "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD

      - name: Toolchain evidence
        run: |
          rustc --version
          cargo --version

      - name: "AC-DL-1 sections 1-5 and 7 — hermetic guard tests, release mode"
        run: cargo test --release --locked -p holmes-guard

      - name: "AC-DL-1 section 6 — EXECUTING (landed at Phase 2 lock 2b)"
        run: |
          echo "AC-DL-1 section 6 (memory-layer default-config egress criterion) is"
          echo "no longer SCHEDULED: the memory layer exists (crates/holmes-wall)."
          echo "Its default config reaches no cloud endpoint, and the excluded"
          echo "canary endpoint is denied at L1a even if forced. Proven by the tests"
          echo "run in the workspace suite step below:"
          echo "  holmes_wall::memory (default reaches no excluded endpoint; excluded"
          echo "  provider unrepresentable) + tests/wall_locks::lock2b (live L1a 403 +"
          echo "  Denied event for the excluded canary host)."

      - name: "AC-DL-2 positive control (v3 section 4) — planted lockfile fires the gate"
        run: |
          set +e
          cargo run --release --locked -p holmes-guard --bin acdl2-scan -- \
            --root . --lockfile crates/holmes-guard/tests/fixtures/planted.lock \
            > planted-report.txt 2>&1
          status=$?
          set -e
          cat planted-report.txt
          if [ "$status" -eq 0 ]; then
            echo "POSITIVE CONTROL FAILED TO FIRE: planted lockfile passed the gate"
            exit 1
          fi
          grep -q "verdict: FAIL" planted-report.txt
          echo "positive control fired as required (exit $status)"

      - name: "AC-DL-2 negative control (v3 section 5) — the real tree passes untouched"
        run: cargo run --release --locked -p holmes-guard --bin acdl2-scan -- --root .

      - name: "Lock 0d — embedding contract: workspace tests (consumer + structural)"
        run: cargo test --release --locked --workspace

      - name: "Phase 2.5 — Safety before surface (hard gate): safety lock suite"
        run: |
          echo "Locks 2.5a (injection quarantine) / 2.5b (calibration+knowability"
          echo "gating) / 2.5c (tool-approval) / 2.5d (anti-doxxing + person-naming"
          echo "threshold, handoff-only), plus the raw-bytes name-firewall and the"
          echo "F-034/F-035/F-036 adversarial-pass regressions:"
          cargo test --release --locked -p holmes-core --test safety_locks
          cargo test --release --locked -p holmes-core --lib safety::
          echo "The stated_confidence firewall now covers src/safety as well as"
          echo "src/analysis (see analysis_locks::stated_confidence_firewall_is_structural)."

      - name: "Phase 4 — Observability & hardening: lock suite (analytical beta, D-14=A)"
        run: |
          echo "Lock 4a (telemetry content-free by construction + cross-stack"
          echo "correlation, opt-in/local-only), the deny-by-default permission"
          echo "manifest, the D-14(a) investigative-absent locks, and the F-037"
          echo "no-leak firewall:"
          cargo test --release --locked -p holmes-core --test observability_locks
          cargo test --release --locked -p holmes-core --lib observability::
          echo "Beta build must compile with the investigative feature OFF"
          echo "(absent, not dark-flagged); the default build above already proves it."

      - name: "Lock 1d — recipe safety scan, negative control (real recipes clean)"
        run: cargo run --release --locked -p holmes-guard --bin recipe-scan -- --path recipes

      - name: "Lock 1d — recipe safety scan, positive control (planted smuggled recipe fires)"
        run: |
          set +e
          cargo run --release --locked -p holmes-guard --bin recipe-scan -- \
            --path crates/holmes-guard/tests/fixtures/planted_recipe_smuggled.yaml \
            > recipe-planted-report.txt 2>&1
          status=$?
          set -e
          cat recipe-planted-report.txt
          if [ "$status" -eq 0 ]; then
            echo "POSITIVE CONTROL FAILED TO FIRE: planted smuggled recipe passed"
            exit 1
          fi
          grep -q "verdict: FAIL" recipe-planted-report.txt
          echo "positive control fired as required (exit $status)"
